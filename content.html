<p>Factorial can be defined recursively as:</p>
<p>$$n! = \begin{cases} 1 & \text{if }n = 0 \\ n \times (n-1)! & \text{if } n > 0 \end{cases}$$</p>

<h2>Base case and recursive case</h2>
<ul>
  <li><strong>Base case:</strong> <code>0! = 1</code></li>
  <li><strong>Recursive case:</strong> for <code>n &gt; 0</code>, multiply <code>n</code> by <code>(n-1)!</code></li>
</ul>
<p>This reduces larger values of <code>n</code> towards the base case.</p>
